  <script>
    const loadMemory=key=>{try{return JSON.parse(localStorage.getItem(key))||[]}catch{return[]}};
    const applyTheme=theme=>{document.documentElement.setAttribute('data-theme',theme);document.querySelectorAll('#themeSwitch [data-theme-choice]').forEach(btn=>btn.classList.toggle('active',btn.dataset.themeChoice===theme))};
    let currentTheme='light';
    try{currentTheme=localStorage.getItem('battleTrackerTheme')||'light'}catch{}
    applyTheme(currentTheme);
    let storageErrorNotified=false;
    function notifyStorageError(err){
      console.error('localStorage \u5beb\u5165\u5931\u6557',err);
      if(storageErrorNotified)return;
      storageErrorNotified=true;
      alert('\u26a0\ufe0f \u5132\u5b58\u5931\u6557\uff1a\u700f\u89bd\u5668\u5132\u5b58\u7a7a\u9593\u53ef\u80fd\u5df2\u6eff\u6216\u7121\u6cd5\u4f7f\u7528\uff0c\u76ee\u524d\u7684\u8b8a\u66f4\u66ab\u6642\u4e0d\u6703\u4fdd\u5b58\u5230\u672c\u6a5f\uff0c\u91cd\u65b0\u6574\u7406\u9801\u9762\u5f8c\u53ef\u80fd\u907a\u5931\u3002\u5efa\u8b70\u7acb\u5373\u4f7f\u7528\u300c\u532f\u51fa\u5099\u4efd\u300d\u4fdd\u5b58\u76ee\u524d\u9032\u5ea6\uff0c\u4e26\u8003\u616e\u522a\u9664\u90e8\u5206\u8206\u56b7\u7684\u5b58\u6a94\u6216\u7bc4\u672c\u5f8c\u518d\u8a66\u3002');
    }
    function setStorageItem(key,raw){
      try{
        localStorage.setItem(key,raw);
        storageErrorNotified=false;
        return true;
      }catch(err){
        notifyStorageError(err);
        return false;
      }
    }
    document.querySelector('#themeSwitch').addEventListener('click',event=>{const btn=event.target.closest('[data-theme-choice]');if(!btn)return;currentTheme=btn.dataset.themeChoice;applyTheme(currentTheme);setStorageItem('battleTrackerTheme',currentTheme)});
    let wakeLock=null;
    let keepScreenAwakePref=false;
    try{keepScreenAwakePref=localStorage.getItem('battleTrackerWakeLock')==='on'}catch{}
    function updateWakeLockButton(){
      const btn=document.querySelector('#toggleWakeLock');
      btn.textContent=keepScreenAwakePref?'\ud83d\udd06 \u4fdd\u6301\u87a2\u5e55\u958b\u555f\uff1a\u958b':'\ud83d\udd06 \u4fdd\u6301\u87a2\u5e55\u958b\u555f\uff1a\u95dc';
      btn.classList.toggle('good',keepScreenAwakePref);
      btn.title=keepScreenAwakePref?'\u87a2\u5e55\u4e0d\u6703\u81ea\u52d5\u719f\u7761\uff0c\u9ede\u64ca\u53ef\u95dc\u9589\u3002':'\u87a2\u5e55\u6703\u4f9d\u624b\u6a5f/\u5e73\u677f\u8a2d\u5b9a\u81ea\u52d5\u719f\u7761\uff0c\u9ede\u64ca\u53ef\u4fdd\u6301\u5e38\u4eae\u3002';
    }
    async function requestWakeLock(){
      if(!('wakeLock' in navigator))return false;
      try{
        wakeLock=await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release',()=>{wakeLock=null});
        return true;
      }catch(err){
        console.error('Wake Lock \u8981\u6c42\u5931\u6557',err);
        return false;
      }
    }
    function releaseWakeLock(){
      if(wakeLock){try{wakeLock.release()}catch{}wakeLock=null}
    }
    document.querySelector('#toggleWakeLock').addEventListener('click',async()=>{
      keepScreenAwakePref=!keepScreenAwakePref;
      try{localStorage.setItem('battleTrackerWakeLock',keepScreenAwakePref?'on':'off')}catch{}
      updateWakeLockButton();
      if(keepScreenAwakePref){
        const ok=await requestWakeLock();
        if(!ok){
          alert('\u6b64\u700f\u89bd\u5668\u6216\u4f5c\u696d\u7cfb\u7d71\u7248\u672c\u4e0d\u652f\u63f4\u4fdd\u6301\u87a2\u5e55\u958b\u555f\u529f\u80fd\uff08iOS \u9700 16.4 \u4ee5\u4e0a\uff0cAndroid \u5efa\u8b70\u4f7f\u7528 Chrome\uff09\uff0c\u8acb\u624b\u52d5\u8abf\u6574\u88dd\u7f6e\u7684\u81ea\u52d5\u719f\u7761\u6642\u9593\u3002');
        }
      }else{
        releaseWakeLock();
      }
    });
    document.addEventListener('visibilitychange',()=>{
      if(document.visibilityState==='visible'&&keepScreenAwakePref&&!wakeLock)requestWakeLock();
    });
    updateWakeLockButton();

        const badge=cardEl.querySelector('.swipe-badge');
        if(badge)badge.remove();
      }
      function updateSwipeBadge(cardEl,dx,amount){
        let badge=cardEl.querySelector('.swipe-badge');
        if(!badge){
          badge=document.createElement('div');
          badge.className='swipe-badge';
          cardEl.appendChild(badge);
        }
        const isDamage=dx<0;
        badge.className='swipe-badge '+(isDamage?'damage':'heal');
        badge.textContent=(isDamage?'\u2212':'+')+amount;
      }
      function onPointerDown(event){
        if(event.pointerType!=='touch'&&event.pointerType!=='pen')return;
        const cardEl=event.target.closest('.card');
        if(!cardEl)return;
        if(event.target.closest('button,input,select,textarea,a,form'))return;
        swipe={cardEl,unitId:cardEl.dataset.cardId,pointerId:event.pointerId,startX:event.clientX,startY:event.clientY,dx:0,locked:null};
      }
      function onPointerMove(event){
        if(!swipe||event.pointerId!==swipe.pointerId)return;
        const dx=event.clientX-swipe.startX;
        const dy=event.clientY-swipe.startY;
        if(swipe.locked===null){
          if(Math.abs(dx)<SWIPE_START_LOCK&&Math.abs(dy)<SWIPE_START_LOCK)return;
          swipe.locked=Math.abs(dx)>Math.abs(dy);
          if(swipe.locked){try{swipe.cardEl.setPointerCapture(event.pointerId)}catch{}}
        }
        if(!swipe.locked)return;
        swipe.dx=Math.max(-SWIPE_MAX,Math.min(SWIPE_MAX,dx));
        swipe.cardEl.classList.add('swiping');
        swipe.cardEl.style.transform=`translateX(${swipe.dx}px)`;
        if(Math.abs(swipe.dx)>=20){
          swipe.cardEl.classList.toggle('swipe-damage',swipe.dx<0);
          swipe.cardEl.classList.toggle('swipe-heal',swipe.dx>0);
          const armed=Math.abs(swipe.dx)>=SWIPE_ACTIVATE;
          if(armed&&!swipe.wasArmed&&navigator.vibrate)try{navigator.vibrate(12)}catch{}
          swipe.wasArmed=armed;
          swipe.cardEl.classList.toggle('swipe-armed',armed);
          updateSwipeBadge(swipe.cardEl,swipe.dx,cardAmount(swipe.cardEl));

      btn.title=autoScrollOnNextTurn?'\u76ee\u524d\uff1a\u6309\u4e0b\u4e00\u4f4d\u6642\u6703\u81ea\u52d5\u6372\u52d5\u5230\u5c0d\u61c9\u5361\u7247\u3002\u9ede\u64ca\u5207\u63db\u70ba\u4e0d\u81ea\u52d5\u6372\u52d5\u3002':'\u76ee\u524d\uff1a\u6309\u4e0b\u4e00\u4f4d\u4e0d\u6703\u81ea\u52d5\u6372\u52d5\u756b\u9762\u3002\u9ede\u64ca\u5207\u63db\u70ba\u81ea\u52d5\u6372\u52d5\u5230\u5c0d\u61c9\u5361\u7247\u3002';
      document.querySelector('#floatingNextTurn').hidden=!autoScrollOnNextTurn;
    }
    document.querySelector('#toggleAutoScroll').addEventListener('click',()=>{autoScrollOnNextTurn=!autoScrollOnNextTurn;updateAutoScrollButton();scheduleAutosave()});
    updateAutoScrollButton();
    document.querySelector('#toggleInitiative').addEventListener('click',()=>{initiativeExpanded=!initiativeExpanded;document.querySelector('#initiativeContent').hidden=!initiativeExpanded;document.querySelector('#toggleInitiative').textContent=initiativeExpanded?'收合先攻區':'展開先攻區';scheduleAutosave()});
    document.querySelector('#btnExportData').addEventListener('click',exportData);
    document.querySelector('#btnImportData').addEventListener('click',()=>document.querySelector('#importFile').click());
    document.querySelector('#importFile').addEventListener('change',event=>{const file=event.target.files[0];if(file)importDataFromFile(file);event.target.value=''});
    document.querySelector('main').addEventListener('input',event=>{const nameInput=event.target.closest('.unit-name-input');if(!nameInput)return;const style=getComputedStyle(nameInput);const ctx=sizeUnitNameInputs._ctx||(sizeUnitNameInputs._ctx=document.createElement('canvas').getContext('2d'));ctx.font=`${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;nameInput.style.width=Math.ceil(ctx.measureText(nameInput.value||'').width+16)+'px'});
    document.querySelector('main').addEventListener('change',event=>{const hpInput=event.target.closest('[data-hp-form] input');if(hpInput){hpInput.closest('form').requestSubmit();return}const nameInput=event.target.closest('[data-unit-name]');if(nameInput){const unit=findUnit(nameInput.dataset.unitName);if(unit){const val=nameInput.value.trim();if(val){saveHistory();unit.name=val}}render();return}const colorInput=event.target.closest('[data-unit-color]');if(colorInput){const unit=findUnit(colorInput.dataset.unitColor);if(unit){saveHistory();unit.color=colorInput.value;render()}return}const barValueInput=event.target.closest('[data-bar-value]');if(barValueInput){const unit=findUnit(barValueInput.dataset.barValue);const bar=unit?.bars?.find(item=>item.id===barValueInput.dataset.barId);if(bar){saveHistory();bar.value=Math.max(0,Math.min(bar.maxValue,Math.floor(Number(barValueInput.value))||0));render()}return}const barColorInput=event.target.closest('[data-bar-color]');if(barColorInput){const unit=findUnit(barColorInput.dataset.barColor);const bar=unit?.bars?.find(item=>item.id===barColorInput.dataset.barId);if(bar){saveHistory();bar.color=barColorInput.value;render()}return}const attributeColorInput=event.target.closest('[data-attribute-color]');if(attributeColorInput){const unit=findUnit(attributeColorInput.dataset.attributeColor);const attribute=unit?.attributes?.find(item=>item.id===attributeColorInput.dataset.attributeId);if(attribute){saveHistory();attribute.color=attributeColorInput.value;render()}return}const barMaxInput=event.target.closest('[data-bar-max]');if(barMaxInput){const unit=findUnit(barMaxInput.dataset.barMax);const bar=unit?.bars?.find(item=>item.id===barMaxInput.dataset.barId);if(bar){saveHistory();const newMax=Math.max(1,Math.floor(Number(barMaxInput.value))||1);bar.maxValue=newMax;bar.value=Math.min(bar.value,newMax);render()}return}const input=event.target.closest('[data-attribute-value]');if(!input)return;const unit=findUnit(input.dataset.attributeValue);const attribute=unit?.attributes?.find(item=>item.id===input.dataset.attributeId);if(attribute){saveHistory();attribute.value=input.value;render()}});
    document.querySelector('#togglePlayers').addEventListener('click',()=>{playersExpanded=!playersExpanded;document.querySelector('#playerContent').hidden=!playersExpanded;document.querySelector('#togglePlayers').textContent=playersExpanded?'\u6536\u5408\u73a9\u5bb6\u8cc7\u8a0a':'\u5c55\u958b\u73a9\u5bb6\u8cc7\u8a0a';scheduleAutosave()});
    document.querySelector('#toggleMonsters').addEventListener('click',()=>{monstersExpanded=!monstersExpanded;document.querySelector('#monsterContent').hidden=!monstersExpanded;document.querySelector('#toggleMonsters').textContent=monstersExpanded?'\u6536\u5408\u602a\u7269\u8cc7\u8a0a':'\u5c55\u958b\u602a\u7269\u8cc7\u8a0a';scheduleAutosave()});
    document.querySelector('#togglePlayerSummary').addEventListener('click',()=>{playerSummaryExpanded=!playerSummaryExpanded;document.querySelector('#playerSummary').hidden=!playerSummaryExpanded;document.querySelector('#togglePlayerSummary').textContent=playerSummaryExpanded?'\u6536\u5408\u6458\u8981':'\u5c55\u958b\u6458\u8981';scheduleAutosave()});
    document.querySelector('#toggleMonsterSummary').addEventListener('click',()=>{monsterSummaryExpanded=!monsterSummaryExpanded;document.querySelector('#monsterSummary').hidden=!monsterSummaryExpanded;document.querySelector('#toggleMonsterSummary').textContent=monsterSummaryExpanded?'\u6536\u5408\u6458\u8981':'\u5c55\u958b\u6458\u8981';scheduleAutosave()});
    document.querySelector('#playerContent').hidden=!playersExpanded;
    document.querySelector('#togglePlayers').textContent=playersExpanded?'\u6536\u5408\u73a9\u5bb6\u8cc7\u8a0a':'\u5c55\u958b\u73a9\u5bb6\u8cc7\u8a0a';
    document.querySelector('#monsterContent').hidden=!monstersExpanded;
    document.querySelector('#toggleMonsters').textContent=monstersExpanded?'\u6536\u5408\u602a\u7269\u8cc7\u8a0a':'\u5c55\u958b\u602a\u7269\u8cc7\u8a0a';
    document.querySelector('#playerSummary').hidden=!playerSummaryExpanded;
    document.querySelector('#togglePlayerSummary').textContent=playerSummaryExpanded?'\u6536\u5408\u6458\u8981':'\u5c55\u958b\u6458\u8981';
    document.querySelector('#monsterSummary').hidden=!monsterSummaryExpanded;
    document.querySelector('#toggleMonsterSummary').textContent=monsterSummaryExpanded?'\u6536\u5408\u6458\u8981':'\u5c55\u958b\u6458\u8981';
    document.querySelector('#roundMinus').addEventListener('click',()=>{roundCounter=Math.max(0,roundCounter-1);document.querySelector('#roundValue').textContent=roundCounter;scheduleAutosave()});
    document.querySelector('#roundPlus').addEventListener('click',()=>{roundCounter=Math.min(9999,roundCounter+1);document.querySelector('#roundValue').textContent=roundCounter;scheduleAutosave()});
    document.querySelector('#roundValue').textContent=roundCounter;
    document.querySelector('#initiativeContent').hidden=!initiativeExpanded;
    document.querySelector('#toggleInitiative').textContent=initiativeExpanded?'收合先攻區':'展開先攻區';
    render();
    (function(){
      const tabbar=document.querySelector('#bottomTabbar');
      if(!tabbar)return;
      tabbar.addEventListener('click',event=>{
        const btn=event.target.closest('button[data-target]');
        if(!btn)return;
        const tab=TAB_SECTION_TO_TAB[btn.dataset.target];
        if(tab)setActiveTab(tab,{scroll:true});
      });
    })();
    updateTabbarHeightVar();
    setActiveTab(activeTab,{scroll:false});
  </script>
</body>
